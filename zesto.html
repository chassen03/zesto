<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Zesto — Food, delivered</title>
<style>
  :root{
    --red:#d6273f;--red-deep:#b01e33;--red-soft:#fff0f2;--red-tint:#fde8eb;
    --ink:#171719;--sub:#71717a;--line:#eeeef1;--field:#f5f5f7;
    --green:#12924a;--amber:#e8a13a;--card:#fff;
    --shadow:0 6px 24px rgba(0,0,0,.08);--shadow-lg:0 14px 40px rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#0c0c0e;color:var(--ink);display:flex;justify-content:center}
  #phone{width:100%;max-width:430px;background:#fff;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
  @media(min-width:600px){body{align-items:center;padding:16px}#phone{height:900px;min-height:0;border-radius:38px;box-shadow:var(--shadow-lg);border:10px solid #0c0c0e}}
  .screen{flex:1;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .screen::-webkit-scrollbar{display:none}
  button{font-family:inherit;border:none;cursor:pointer}
  .btn{width:100%;background:var(--red);color:#fff;border-radius:14px;padding:16px;font-size:15px;font-weight:600;letter-spacing:.2px;box-shadow:0 6px 18px rgba(214,39,63,.28)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{background:#eab8c0;box-shadow:none}
  .btn-ghost{background:transparent;color:var(--sub);font-size:12.5px;font-weight:500;padding:8px}
  .btn-outline{background:#fff;color:var(--red);border:1.5px solid var(--red);box-shadow:none}
  .field{width:100%;background:var(--field);border:1px solid transparent;border-radius:12px;padding:14px 15px;font-size:15px}
  .field:focus{outline:none;border-color:var(--red);background:#fff}
  .pill{display:inline-block;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--field);color:var(--sub)}
  .row{display:flex;align-items:center;justify-content:space-between}
  .muted{color:var(--sub)}
  .topbar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:10}
  .cardbox{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--red-soft);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:1.5px solid var(--red)}
  .cart-bar{position:sticky;bottom:0;background:var(--red);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -6px 20px rgba(214,39,63,.24);cursor:pointer}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.18);z-index:50;animation:up .28s cubic-bezier(.2,.8,.2,1);max-height:80%;display:flex;flex-direction:column}
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-pad{padding:22px 20px 26px}
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:40;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);background:#1f1f22;color:#fff;font-size:12.5px;padding:12px 16px;border-radius:12px;z-index:120;max-width:88%;text-align:center;line-height:1.4;box-shadow:var(--shadow-lg)}
  .spin{width:26px;height:26px;border:3px solid var(--red-tint);border-top-color:var(--red);border-radius:50%;animation:rot .8s linear infinite;display:inline-block}
  @keyframes rot{to{transform:rotate(360deg)}}
  .fadein{animation:fi .4s ease}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .strike{position:relative;opacity:.5}
  .strike:after{content:"";position:absolute;left:8px;right:8px;top:50%;height:2px;background:var(--sub);transform:rotate(-4deg)}
  .filtchip{flex:none;padding:8px 14px;border-radius:20px;background:var(--field);font-size:12.5px;color:var(--sub);white-space:nowrap}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<body>
<div id="phone"><div class="screen" id="screen"></div></div>
<script>
const screen = document.getElementById("screen");
 
// ---------------- STATE ----------------
const M = {
  page:"splash", taps:0, startTime:null,
  // profile / entered data
  user:{ name:"", phone:"", cc:"+91", flag:"🇮🇳",
    addr:{a:"",b:"",c:"",d:""} },
  cart:[],
  memorizedCode:"", codeMsg:"",
  searchStage:0,
  pastOrders:[
    ["Spice Route","Chicken Biryani × 1","₹336","2 days ago"],
    ["Bella Napoli","Margherita Pizza × 2","₹710","last week"],
    ["Wok & Roll","Veg Hakka Noodles","₹289","3 weeks ago"],
  ],
};
function tap(){ M.taps++; }
function nav(p){ tap(); M.page=p; try{screen.scrollTo(0,0)}catch(e){} render(); }
function toast(msg,ms=2500){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.getElementById("phone").appendChild(t);setTimeout(()=>t.remove(),ms);}
function money(n){return "₹"+n;}
function cartCount(){return M.cart.reduce((s,i)=>s+i.qty,0);}
function cartSubtotal(){return M.cart.reduce((s,i)=>s+i.price*i.qty,0);}
 
// top-right avatar (goes to profile)
function avatar(){ return `<div class="avatar" onclick="nav('profile')">👤</div>`; }
 
// ---------------- SPLASH ----------------
function splash(){
  screen.innerHTML=`
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--red),var(--red-deep));color:#fff">
    <div class="fadein" style="text-align:center">
      <div style="font-size:15px;letter-spacing:6px;opacity:.85;font-weight:600">ZESTO</div>
      <div style="font-size:40px;margin-top:8px">🍜</div>
      <div style="margin-top:26px;width:200px;height:6px;background:rgba(255,255,255,.25);border-radius:6px;overflow:hidden">
        <div id="bar" style="height:100%;width:0;background:#fff;border-radius:6px;transition:width .4s"></div>
      </div>
      <div id="loadtxt" style="font-size:12px;margin-top:14px;opacity:.85">Preparing your experience…</div>
    </div>
  </div>`;
  const bar=document.getElementById("bar"),txt=document.getElementById("loadtxt");
  const seq=[20,48,76,100,0,34,68,100];let i=0;
  const tick=()=>{
    if(i>=seq.length){ M.startTime=Date.now(); nav("address"); return; }
    const p=seq[i]; bar.style.width=p+"%";
    if(p===100&&i<4)txt.textContent="Almost there…";
    else if(p===0)txt.textContent="Just a moment, optimising…";
    else if(i>=5)txt.textContent="Finalising the finishing touches…";
    i++; setTimeout(tick,p===0?520:640);
  };
  setTimeout(tick,500);
}
 
// ---------------- PAGE I: ADDRESS (first thing) ----------------
function address(){
  const a=M.user.addr;
  screen.innerHTML=`
  <div class="topbar">
    <div style="font-weight:800;font-size:16px">Add delivery details</div>
    ${avatar()}
  </div>
  <div style="padding:16px 18px 8px;background:linear-gradient(135deg,#f5d0d6,#f8e3e7);margin:0">
    <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#7a1523;font-weight:600">📍 We found you near Delhi-Gurgaon border.</div>
  </div>
  <div style="padding:16px 18px 40px">
    <div style="font-size:18px;font-weight:800">Where should we deliver?</div>
    <div style="font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.5">We've located you — now please add your full address. Each field needs at least 6 characters.</div>
 
    <div style="font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.4px;margin:18px 0 8px">MOBILE NUMBER</div>
    <div style="display:flex;gap:8px">
      <button onclick="openCC()" style="flex:none;background:var(--field);border-radius:12px;padding:14px 12px;font-size:15px;display:flex;align-items:center;gap:6px">
        <span>${M.user.flag}</span><span>${M.user.cc}</span><span style="color:var(--sub);font-size:12px">▾</span>
      </button>
      <input class="field" placeholder="Mobile number" inputmode="numeric" value="${M.user.phone}" oninput="M.user.phone=this.value.replace(/\\D/g,'').slice(0,10)" />
    </div>
 
    <div style="font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.4px;margin:20px 0 8px">ADDRESS</div>
    <input id="fa" class="field" style="margin-bottom:10px" placeholder="a. Flat / House no. (min 6 chars)" value="${a.a}" oninput="M.user.addr.a=this.value" />
    <input id="fb" class="field" style="margin-bottom:10px" placeholder="b. Building / Street (min 6 chars)" value="${a.b}" oninput="M.user.addr.b=this.value" />
    <input id="fc" class="field" style="margin-bottom:10px" placeholder="c. Area / Landmark (min 6 chars)" value="${a.c}" oninput="M.user.addr.c=this.value" />
    <input id="fd" class="field" placeholder="d. PIN code (6 digits)" inputmode="numeric" value="${a.d}" oninput="this.value=this.value.replace(/\\D/g,'').slice(0,6);M.user.addr.d=this.value" />
 
    <button class="btn" style="margin-top:22px" onclick="saveAddress()">Save & see restaurants</button>
  </div>`;
}
function saveAddress(){
  tap();
  const a=M.user.addr;
  if((a.a||"").length<6){toast("Field a needs at least 6 characters.");return;}
  if((a.b||"").length<6){toast("Field b needs at least 6 characters.");return;}
  if((a.c||"").length<6){toast("Field c needs at least 6 characters.");return;}
  if((a.d||"").length!==6){toast("Please enter a valid 6-digit PIN code.");return;}
  nav("list");
}
 
// ---------------- PAGE II: LIST, NO SEARCH ----------------
function list(){
  screen.innerHTML=`
  <div class="topbar">
    <div style="flex:1;display:flex;align-items:center;gap:8px;background:var(--field);border-radius:12px;padding:11px 13px" class="strike" onclick="toast('Search is not available on this page.')">
      <span>🔍</span><span style="color:var(--sub);font-size:14px">Search</span>
    </div>
    <div style="margin-left:12px">${avatar()}</div>
  </div>
 
  <div style="padding:16px 18px 100px">
    <div style="font-size:15px;font-weight:800">Browse</div>
    <div class="muted" style="font-size:12px;margin-top:2px">Scroll to find what you want — there's no search here.</div>
 
    <div class="cardbox" style="margin-top:14px">
      ${["🍛 Options","🍽️ Restaurants","🎟️ Codes & offers"].map((x,i)=>`<div class="row" onclick="${i===2?'openCodes()':`nav('search')`}" style="padding:16px 14px;${i<2?'border-bottom:1px solid var(--line)':''};cursor:pointer">
        <div style="font-size:15px;font-weight:600">${x}</div><span style="color:var(--sub)">›</span></div>`).join("")}
    </div>
 
    <div style="margin-top:22px;font-size:14px;font-weight:800">Today's offers</div>
    <div class="muted" style="font-size:12px;margin-top:2px">Note the codes down — you'll need to type them yourself later.</div>
    ${[["ZESTO60","60% off up to ₹120"],["FREEDEL399","Free delivery over ₹399"],["BINGE250","Flat ₹250 off over ₹899"]].map(c=>`
      <div class="cardbox" style="margin-top:10px;padding:14px" class="row">
        <div class="row">
          <div>
            <div style="font-size:15px;font-weight:800;letter-spacing:.5px">${c[0]}</div>
            <div style="font-size:12.5px;color:var(--sub);margin-top:3px">${c[1]}</div>
          </div>
        </div>
        <div style="text-align:right;margin-top:8px"><span style="font-size:11px;color:var(--amber);font-weight:600">no copy button — memorise it</span></div>
      </div>`).join("")}
 
    <button class="btn" style="margin-top:22px" onclick="nav('search')">Continue to find food</button>
  </div>`;
}
function openCodes(){
  showSheet(`<div class="sheet-pad">
    <div style="font-size:16px;font-weight:800">Offer codes</div>
    <div style="font-size:12.5px;color:var(--sub);margin-top:6px">Please remember these. They can only be entered manually at the cart.</div>
    ${["ZESTO60","FREEDEL399","BINGE250"].map(c=>`<div style="margin-top:12px;font-size:16px;font-weight:800;letter-spacing:1px">${c}</div>`).join("")}
    <button class="btn" style="margin-top:20px" onclick="closeSheet()">Got it (I'll remember)</button>
  </div>`);
}
 
// ---------------- PAGE III: SEARCH THAT STILL FAILS ----------------
function search(){
  const opts=Array.from({length:20},(_,i)=>i+1);
  screen.innerHTML=`
  <div class="topbar">
    <span onclick="nav('list')" style="font-size:22px;cursor:pointer">‹</span>
    <div style="flex:1;margin:0 10px;display:flex;align-items:center;gap:8px;background:var(--field);border-radius:12px;padding:11px 13px">
      <span>🔍</span><input id="sq" class="field" style="padding:0;background:transparent;font-size:14px" placeholder="Search dishes… (try it)" />
    </div>
    ${avatar()}
  </div>
 
  <div style="padding:14px 18px 4px">
    <button class="btn" onclick="tryFailSearch()">Search</button>
    <div id="smsg" style="font-size:12.5px;color:var(--sub);margin-top:10px;min-height:16px"></div>
  </div>
 
  <div style="padding:8px 18px 4px;display:flex;gap:8px;overflow-x:auto">
    ${["Filters","Pure Veg","Rating 4.0+","Offers","Fast delivery","Price","Cuisines","Sort"].map(f=>`<span class="filtchip" onclick="toast('Filter applied. Still ${opts.length} options.')">${f}</span>`).join("")}
  </div>
 
  <div style="padding:10px 18px 100px">
    <div class="row"><div style="font-size:14px;font-weight:800">${opts.length} options</div>
      <div style="font-size:12px;color:var(--sub)">too many to compare</div></div>
    ${opts.map(n=>`<div onclick="nav('restaurant')" class="cardbox" style="margin-top:10px;padding:12px 14px;display:flex;gap:12px;align-items:center;cursor:pointer">
      <div style="width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,#f5d0d6,#f8e3e7);display:flex;align-items:center;justify-content:center;font-size:22px">${["🍛","🍕","🥘","🍜","🥡"][n%5]}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700">Restaurant option ${n}</div>
        <div style="font-size:12px;color:var(--sub);margin-top:2px">Multi-cuisine · ${25+n%20}–${30+n%20} min</div>
      </div>
      <div style="background:var(--green);color:#fff;font-size:12px;font-weight:700;padding:3px 7px;border-radius:6px">★ ${(3.8+ (n%12)/10).toFixed(1)}</div>
    </div>`).join("")}
  </div>`;
}
function tryFailSearch(){
  tap();
  const msg=document.getElementById("smsg");
  msg.innerHTML=`<span class="spin" style="width:14px;height:14px;border-width:2px"></span> Searching…`;
  setTimeout(()=>{
    M.searchStage++;
    if(M.searchStage<2){ msg.style.color="var(--red)"; msg.textContent="Search is temporarily unavailable. Please browse the options below."; }
    else { msg.style.color="var(--sub)"; msg.textContent="Still no results. Try scrolling through all 20 options instead."; }
  },1400);
}

// Bean-style multi-step add
function openAddSheet(){
  tap();
  showSheet(`<div class="sheet-pad">
    <div style="font-size:16px;font-weight:800">Add “Chicken Biryani”</div>
    <div style="font-size:12.5px;color:var(--sub);margin-top:4px">Which meal is this for?</div>
    <div style="display:flex;gap:8px;margin-top:14px">
      ${["Lunch","Dinner","Later"].map(m=>`<button class="pill" style="flex:1;padding:12px 0" onclick="addStep2()">${m}</button>`).join("")}
    </div></div>`);
}
function addStep2(){
  tap();
  showSheet(`<div class="sheet-pad">
    <div style="font-size:16px;font-weight:800">Confirm quantity</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:18px">
      <span style="font-size:14px">Chicken Biryani</span>
      <div style="display:flex;align-items:center;gap:26px">
        <button style="width:34px;height:34px;border-radius:8px;background:var(--field);font-size:18px;color:var(--sub)">–</button>
        <span style="font-weight:700">1</span>
        <button style="width:34px;height:34px;border-radius:8px;background:var(--field);font-size:18px;color:var(--red)">+</button>
      </div>
    </div>
    <button class="btn" style="margin-top:20px" onclick="addStep3()">Confirm quantity: 1</button></div>`);
}
function addStep3(){
  tap();
  showSheet(`<div class="sheet-pad" style="text-align:center">

function closeSheet(){["scrim","sheet"].forEach(id=>{const e=document.getElementById(id);if(e)e.remove();});}
function render(){
  closeSheet();
  const p=M.page;
  if(p==="splash")return splash();
  if(p==="address")return address();
  if(p==="list")return list();
  if(p==="search")return search();
  if(p==="restaurant")return restaurant();
  if(p==="dish")return dish();
  if(p==="cart")return cart();
  if(p==="profile")return profile();

}
