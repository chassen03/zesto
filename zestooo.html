<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#d6273f" />
<title>Zesto — Food, delivered</title>
<style>
  :root{
    --red:#d6273f;--red-deep:#b01e33;--red-soft:#fff0f2;--red-tint:#fde8eb;
    --ink:#171719;--sub:#71717a;--line:#eeeef1;--field:#f5f5f7;
    --green:#12924a;--amber:#e8a13a;--poppy:#ffd21f;--poppy-bg:#fff8d6;--card:#fff;
    --shadow:0 6px 24px rgba(0,0,0,.08);--shadow-lg:0 14px 40px rgba(0,0,0,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow-x:hidden}
  body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#fff;color:var(--ink);display:flex;justify-content:center}
  #phone{width:100%;max-width:100%;background:#fff;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
  @media(min-width:600px){body{background:#0c0c0e;align-items:center;padding:16px}#phone{max-width:430px;height:900px;min-height:0;border-radius:38px;box-shadow:var(--shadow-lg);border:10px solid #0c0c0e}}
  .screen{flex:1;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .screen::-webkit-scrollbar{display:none}
  button{font-family:inherit;border:none;cursor:pointer}
  .btn{width:100%;background:var(--red);color:#fff;border-radius:14px;padding:16px;font-size:15px;font-weight:600;letter-spacing:.2px;box-shadow:0 6px 18px rgba(214,39,63,.28)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{background:#eab8c0;box-shadow:none}
  .btn-outline{background:#fff;color:var(--red);border:1.5px solid var(--red);box-shadow:none}
  .field{width:100%;background:var(--field);border:1px solid transparent;border-radius:12px;padding:14px 15px;font-size:15px}
  .field:focus{outline:none;border-color:var(--red);background:#fff}
  .pill{display:inline-block;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;background:var(--field);color:var(--sub)}
  .row{display:flex;align-items:center;justify-content:space-between}
  .muted{color:var(--sub)}
  .topbar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:10}
  .cardbox{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;max-width:100%}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--red-soft);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:1.5px solid var(--red);flex:none}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.18);z-index:50;animation:up .28s cubic-bezier(.2,.8,.2,1);max-height:80%;display:flex;flex-direction:column}
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet-pad{padding:22px 20px 26px}
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:40;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);background:#1f1f22;color:#fff;font-size:12.5px;padding:12px 16px;border-radius:12px;z-index:120;max-width:88%;text-align:center;line-height:1.4;box-shadow:var(--shadow-lg)}
  .spin{width:26px;height:26px;border:3px solid var(--red-tint);border-top-color:var(--red);border-radius:50%;animation:rot .8s linear infinite;display:inline-block}
  @keyframes rot{to{transform:rotate(360deg)}}
  .fadein{animation:fi .4s ease}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .filtchip{flex:none;padding:8px 14px;border-radius:20px;background:var(--field);font-size:12.5px;color:var(--sub);white-space:nowrap}
  [style*="overflow-x:auto"]{max-width:100%}
  .dishframe{position:relative}
  .dishframe .orbit{position:absolute;font-size:15px;animation:orbit 6s linear infinite;will-change:transform}
  @keyframes orbit{0%{transform:rotate(0deg) translateX(60px) rotate(0deg)}100%{transform:rotate(360deg) translateX(60px) rotate(-360deg)}}
  .marquee{overflow:hidden;white-space:nowrap}
  .marquee b{display:inline-block;padding-left:100%;animation:mq 12s linear infinite}
  @keyframes mq{to{transform:translateX(-100%)}}
  .pulse{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .bob{animation:bob 2.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .blink{animation:blink 1.4s steps(2,start) infinite}
  @keyframes blink{50%{opacity:.35}}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="phone"><div class="screen" id="screen"></div></div>
<script>
const screen=document.getElementById("screen");

/* ============================================================
   DATA LAYER — single source of truth + normalized references
   ============================================================ */
const DISHES=[
  {id:0, quirky:"Dilwale Biryani Le Jayenge", real:"Chicken Biryani", cat:"Biryani", emoji:"🍛", price:249,
   origin:"Hyderabad, India (with Persian roots)",
   history:"India's undisputed delivery champion — over 90 million biryanis were ordered on Swiggy in a single year, roughly one for every phone in the country having a really good day. It descends from the Persian 'birian' and was perfected in the kitchens of the Nizams of Hyderabad. Every region, every family, every uncle claims the one true recipe, and whether potato belongs in it has ended friendships. It is less a dish than a national group chat that occasionally produces rice."},
  {id:1, quirky:"Sholay: Kitne Dose The", real:"Masala Dosa", cat:"South Indian", emoji:"🥞", price:149,
   origin:"Udupi, Karnataka",
   history:"The most-ordered vegetarian dish in the country, equally happy at breakfast, lunch, or 11pm. A fermented rice-and-lentil crepe that can stretch longer than your forearm, born in the temple kitchens of Udupi and stuffed with spiced potato somewhere along the way. Ordering the longest one on the table is a recognised competitive sport. It arrives looking less like food and more like architecture."},
  {id:2, quirky:"Munna Bhai V.B.B.S.", real:"Veggie Burger", cat:"Fast Food", emoji:"🍔", price:129,
   origin:"Global, enthusiastically adopted by India",
   history:"The budget-friendly crowd-pleaser that spans every age group and mall food court in the land. The burger is old news worldwide, but India turned the humble veg patty into an art form of aloo, peas, and 'why is this so spicy?'. It is the safe order, the group order, the 'I'm not that hungry' order that somehow always gets finished first."},
  {id:3, quirky:"Kabhi Cheese Kabhi Margherita", real:"Margherita / Veg Pizza", cat:"Pizza", emoji:"🍕", price:299,
   origin:"Naples, Italy",
   history:"The go-to comfort meal for families and late-night cravings alike. Legend says the Margherita was named for an Italian queen and dressed in the colours of her flag. India promptly added corn, paneer, and a second layer of cheese, because subtlety was never the point. It is the dish most likely to be eaten cold from the box at breakfast, and nobody is ashamed."},
  {id:4, quirky:"Kabhi Khushi Kabhi Butter Chicken", real:"Butter Chicken", cat:"North Indian", emoji:"🍗", price:279,
   origin:"Delhi, India (1950s)",
   history:"The rich, creamy North Indian indulgence that launched a thousand naans. Invented in a Delhi kitchen when someone tossed leftover tandoori chicken into a tomato-butter-cream gravy and accidentally created a global icon. It is the dish that people who 'don't eat spicy' order with total confidence, and the reason cream exists as far as most restaurants are concerned."},
  {id:5, quirky:"Paneer Ho Toh Aisa", real:"Paneer Butter Masala", cat:"North Indian", emoji:"🧆", price:229,
   origin:"Delhi, India",
   history:"The top vegetarian curry pick for dinner across India's big cities — butter chicken's meat-free twin, born in the same buttery Delhi kitchens. Paneer itself is thousands of years old, but drowning it in silky tomato-cream sauce is a gloriously modern indulgence. It is the vegetarian's revenge: nobody at the table feels like they missed out."},
  {id:6, quirky:"Idli Aayi, Milegi", real:"Idli", cat:"South Indian", emoji:"⚪", price:99,
   origin:"South India",
   history:"The soft, fluffy steamed cake that dominates the morning delivery charts. Made from fermented rice and lentil batter, idli is possibly the healthiest thing anyone orders on an app, which is exactly why it needs three chutneys and a lake of sambar to feel complete. Ancient, gentle, and quietly judging your other menu choices."},
  {id:7, quirky:"Dal Makhani: Dostana", real:"Dal Makhani", cat:"North Indian", emoji:"🍲", price:239,
   origin:"Punjab, India",
   history:"A comforting, slow-cooked lentil favourite simmered overnight over dying embers — the show-off cousin of everyday dal, once reserved for weddings and guests you wanted to impress. The secret is time, butter, and cream, hiding inside what looks like a humble bowl. It has quietly ended more diets than any dessert on this menu."},
  {id:8, quirky:"Chole Ke Peechhe Kya Hai", real:"Chole Bhature", cat:"North Indian", emoji:"🫓", price:199,
   origin:"Punjab / Delhi, India",
   history:"A heavy, iconic breakfast-and-lunch item that behaves like a dare: a balloon of fried bread the size of your face paired with fiery chickpeas. Delhi's street vendors turned it into an art form, and finishing a full plate before noon is treated as a personality trait. Cardiologists have opinions; nobody is listening."},
  {id:9, quirky:"Aloo Paratha Zindabad", real:"Aloo Paratha", cat:"North Indian", emoji:"🫓", price:119,
   origin:"Punjab, India",
   history:"The staple North Indian breakfast — a whole-wheat flatbread stuffed with spiced potato, shallow-fried, and served with butter melting on top and curd on the side. It is the taste of every Punjabi grandmother's kitchen and the reason 'just one more' is a lie told at breakfast tables nationwide."},
  {id:10, quirky:"Samosa: Kal Ho Naa Ho", real:"Samosa", cat:"Snacks", emoji:"🔺", price:49,
   origin:"Middle East / Central Asia, now wholly Indian",
   history:"India's timeless fried snack — tens of millions consumed daily, undisputed king of the tea-time table. It travelled the Silk Road as the 'samsa' and settled permanently into Indian hearts and arteries. Triangular, crispy, and always slightly too hot to bite, it turns 'I'll just have one' into a life sentence."},
  {id:11, quirky:"Momo Aur Momo", real:"Momos (Veg & Chicken)", cat:"Momos & Tibetan", emoji:"🥟", price:169,
   origin:"Tibet & the Himalayas",
   history:"Little steamed or fried dumplings that crossed the Himalayas and were promptly adopted by every Indian street corner, which then invented fifty chutneys the originals never asked for. What began as humble mountain food is now sold with a fiery red schezwan sauce that would make a Tibetan grandmother faint. Delicious treason, one bite at a time."},
  {id:12, quirky:"Vada Pav Ki Baraat", real:"Vada Pav", cat:"Snacks", emoji:"🍔", price:59,
   origin:"Mumbai, India",
   history:"Mumbai's iconic street-food legend and the original 'burger' of the working city — a spiced potato fritter in a soft pav, armed with chutneys and a fried green chilli for the brave. Invented near Mumbai's railway stations to feed mill workers cheaply, it now fuels the entire city's commute. Small, mighty, and fiercely defended by every Mumbaikar alive."},
  {id:13, quirky:"Kathi Roll: Humraaz", real:"Chicken Kathi Roll", cat:"Rolls & Frankies", emoji:"🌯", price:169,
   origin:"Kolkata, India",
   history:"The go-to on-the-go and late-night meal — skewered kebab wrapped in flaky paratha, invented in Kolkata for gentlemen who wanted kebabs without greasy hands. It has since conquered every midnight craving in the country. Portable, saucy, and the single most reliable friend you have at 2am."},
  {id:14, quirky:"French Fries: Aashiqui", real:"French Fries", cat:"Fast Food", emoji:"🍟", price:99,
   origin:"Belgium / France (disputed)",
   history:"The frequent side and the go-to solo craving — the one item nobody plans to order and everybody ends up ordering. The Belgians and French still argue over who invented them; India settled the matter by adding peri-peri masala and moving on. Golden, salty, and gone before the main course arrives."},
  {id:15, quirky:"Rang De Tandoori", real:"Tandoori Chicken", cat:"North Indian", emoji:"🍗", price:289,
   origin:"Punjab, India",
   history:"Juicy, yoghurt-marinated, and blasted in a searing clay tandoor until charred and dramatic. Popularised in the 1940s, it gets its theatrical red from chilli and a proud history of food colouring. Smoke, char, and maximum drama — it arrives sizzling and demands you stop the conversation to look at it."},
  {id:16, quirky:"Chicken Fried Rice: Don", real:"Chicken Fried Rice", cat:"Indo-Chinese", emoji:"🍚", price:189,
   origin:"Kolkata-style Indian-Chinese",
   history:"A staple of Desi-Chinese cravings — a cuisine that exists nowhere in China and is beloved everywhere in India. Born from Chinese immigrant cooks in Kolkata improvising for Indian palates, it is soy-sauced, wok-tossed, and gloriously inauthentic. The default order for when the group can't agree on anything else."},
  {id:17, quirky:"Nugget Nahi Milega", real:"Chicken Nuggets", cat:"Fast Food", emoji:"🍗", price:149,
   origin:"United States (1950s)",
   history:"A quick, universally loved snack and the great equaliser of picky eaters everywhere. The nugget was engineered in a food lab to be perfectly poppable, and India loves it with a side of schezwan mayo and zero questions asked. Crispy, uniform, and the safest bet on any late-night menu."},
  {id:18, quirky:"Chicken Burger: Baazigar", real:"Chicken Burger", cat:"Fast Food", emoji:"🍔", price:169,
   origin:"Global fast food",
   history:"A popular late-night and fast-food order — the heartier, meatier cousin of the veg burger, stacked with a fried or grilled patty and a suspicious amount of mayo. It is the order placed with confidence at midnight and regretted with dignity the next morning. Reliable, indulgent, and never once described as 'light'."},
  {id:19, quirky:"Gulab Jamun: Zindagi Na Milegi Dobara", real:"Gulab Jamun", cat:"Desserts", emoji:"🍮", price:99,
   origin:"Persia / medieval India",
   history:"The most popular traditional Indian dessert, ordered for every celebration and after-meal craving. Deep-fried milk-solid dumplings soaked in rose-scented syrup, its name means 'rose berry' in Persian. It is physically impossible to eat just one — confirmed by every wedding buffet in recorded history. Warm, sticky, and utterly unbothered by your resolutions."},
];

const RESTAURANTS=[
  {id:0,name:"Biryani By Kilo-Meter",tagline:"Biryani, sold by the memory",intro:"Founded by a man who believed biryani should be weighed like gold, Biryani By Kilo-Meter serves portions 'large enough to settle family disputes'. Please enjoy browsing while we pretend the kitchen isn't on fire with orders."},
  {id:1,name:"The Naan-Sense Kitchen",tagline:"Serious North Indian. Some naan.",intro:"The Naan-Sense Kitchen prides itself on gravies so rich they require a lie-down afterwards. Our chefs trained under someone's aunt who was 'very strict'. We thank you for your patience as you scroll past everything you didn't come here for."},
  {id:2,name:"Dosa-n't Stop Believin'",tagline:"South Indian, on loop",intro:"At Dosa-n't Stop Believin', the batter is fermented, the coffee is filtered, and the wait is character-building. We've been told our dosas are 'longer than the queue', which we take as the highest compliment."},
  {id:3,name:"Munna Bhai Fast Food",tagline:"Burgers, fries & good intentions",intro:"Munna Bhai Fast Food operates on one principle: everything is better fried and slightly too large. Our founder's philosophy — 'apun ko bhookh lagi hai' — guides every menu decision. Enjoy the scenic route to your snack."},
  {id:4,name:"Gobi Wan Kenobi",tagline:"Indo-Chinese from a galaxy far away",intro:"Gobi Wan Kenobi brings you the noble art of Indian-Chinese cooking, a cuisine invented in Kolkata and beloved nowhere in actual China. Our wok has seen things. May the sauce be with you as you browse at length."},
  {id:5,name:"Frankie Goes To Bandra",tagline:"Rolls, wraps & Mumbai attitude",intro:"Frankie Goes To Bandra rolls everything — kebabs, paneer, your patience — into a warm paratha. Born on a Mumbai street corner, raised on hustle. We appreciate you taking the long way to lunch."},
  {id:6,name:"Chaat The Point",tagline:"Street snacks with commitment issues",intro:"Chaat The Point serves snacks that are 90% emotion and 10% tamarind. Our vendors have perfected the art of 'thoda aur' since forever. Please continue scrolling; the point is somewhere further down."},
  {id:7,name:"Momo Magic Circle",tagline:"Dumplings & Himalayan calm",intro:"Momo Magic Circle folds each dumpling by hand and each excuse by heart. Straight from the mountains to your doorstep, eventually. We invite you to enjoy the meditative wait we've prepared for you."},
  {id:8,name:"Halwa True Love",tagline:"Mithai & zero regrets",intro:"Halwa True Love believes dessert is not a course but a lifestyle. Our sweets are soaked, syruped, and slightly excessive, exactly as tradition demands. Take your time — sugar waits for no one, but our checkout does."},
  {id:9,name:"Curry On Regardless",tagline:"Everything, everywhere, all at once",intro:"Curry On Regardless couldn't pick a lane, so it took all of them. Biryani? Yes. Pizza? Somehow. Momos? Don't ask. We are proud generalists and thank you for your considerable patience."},
];

function makeRng(seed){let s=seed>>>0;return ()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
function assignDishes(seed){
  const rng=makeRng(seed);
  RESTAURANTS.forEach(r=>{
    const count=5+Math.floor(rng()*16);
    const pool=DISHES.map(d=>d.id);
    for(let i=pool.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
    r.dishIds=pool.slice(0,count).sort((a,b)=>a-b);
  });
  DISHES.forEach(d=>{ if(!RESTAURANTS.some(r=>r.dishIds.includes(d.id))){ const r=RESTAURANTS[Math.floor(rng()*RESTAURANTS.length)]; r.dishIds.push(d.id); r.dishIds.sort((a,b)=>a-b);} });
}
function buildDishIndex(){const idx={};DISHES.forEach(d=>idx[d.id]=[]);RESTAURANTS.forEach(r=>r.dishIds.forEach(id=>idx[id].push(r.id)));return idx;}
const dishById=id=>DISHES.find(d=>d.id===id);

// build search dictionary from real names + a few aliases
const DISH_DICT={};
DISHES.forEach(d=>{ DISH_DICT[d.real.toLowerCase()]=d.id; DISH_DICT[d.quirky.toLowerCase()]=d.id; });
const ALIASES={"biryani":0,"chicken biryani":0,"dosa":1,"masala dosa":1,"burger":2,"veg burger":2,"pizza":3,"margherita":3,"butter chicken":4,"paneer":5,"paneer butter masala":5,"idli":6,"dal makhani":7,"dal":7,"chole bhature":8,"chole":8,"aloo paratha":9,"paratha":9,"samosa":10,"momo":11,"momos":11,"vada pav":12,"vadapav":12,"kathi roll":13,"roll":13,"frankie":13,"fries":14,"french fries":14,"tandoori chicken":15,"tandoori":15,"fried rice":16,"chicken fried rice":16,"nuggets":17,"chicken nuggets":17,"chicken burger":18,"gulab jamun":19,"jamun":19,"dessert":19,"sweet":19};
Object.assign(DISH_DICT,ALIASES);

/* ============================================================
   STATE
   ============================================================ */
const M={
  page:"splash", taps:0, startTime:null, seed:Math.floor(Math.random()*1e9),
  user:{name:"",phone:"",cc:"+379",flag:"🇻🇦",addr:{a:"",b:"",c:"",d:""}},
  cart:[], memorizedCode:"", codeMsg:"",
  listSearchShown:false, activeResto:0, activeDish:0, searchAttempt:0,
  dishIndex:{},
  pastOrders:[
    ["Biryani By Kilo-Meter","Dilwale Biryani Le Jayenge × 1","₹336","2 days ago"],
    ["Momo Magic Circle","Momo Aur Momo × 2","₹410","last week"],
    ["Halwa True Love","Gulab Jamun: ZNMD × 3","₹289","3 weeks ago"],
  ],
};
assignDishes(M.seed); M.dishIndex=buildDishIndex();

function tap(){M.taps++;}
function nav(p){tap();M.page=p;try{screen.scrollTo(0,0)}catch(e){}render();}
function toast(msg,ms=2600){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.getElementById("phone").appendChild(t);setTimeout(()=>t.remove(),ms);}
function money(n){return "₹"+n;}
function cartCount(){return M.cart.reduce((s,i)=>s+i.qty,0);}
function cartSubtotal(){return M.cart.reduce((s,i)=>s+i.price*i.qty,0);}
function avatar(){return `<div class="avatar" onclick="nav('profile')">👤</div>`;}
function orbitTile(emoji,size){return `<div class="dishframe" style="width:${size}px;height:${size}px;border-radius:14px;background:linear-gradient(135deg,#f5d0d6,#f8e3e7);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.42)}px"><span class="pulse">${emoji}</span><span class="orbit" style="animation-duration:5s">✨</span><span class="orbit" style="animation-duration:7s;animation-delay:-2s">🔥</span></div>`;}

/* ============================================================
   SPLASH
   ============================================================ */
function splash(){
  screen.innerHTML=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--red),var(--red-deep));color:#fff">
    <div class="fadein" style="text-align:center">
      <div style="font-size:15px;letter-spacing:6px;opacity:.85;font-weight:600">ZESTO</div>
      <div style="font-size:40px;margin-top:8px" class="bob">🍜</div>
      <div style="margin-top:26px;width:200px;height:6px;background:rgba(255,255,255,.25);border-radius:6px;overflow:hidden"><div id="bar" style="height:100%;width:0;background:#fff;border-radius:6px;transition:width .4s"></div></div>
      <div id="loadtxt" style="font-size:12px;margin-top:14px;opacity:.85">Preparing your experience…</div>
    </div></div>`;
  const bar=document.getElementById("bar"),txt=document.getElementById("loadtxt");
  const seq=[20,48,76,100,0,34,68,100];let i=0;
  const tick=()=>{if(i>=seq.length){M.startTime=Date.now();nav("address");return;}const p=seq[i];bar.style.width=p+"%";if(p===100&&i<4)txt.textContent="Almost there…";else if(p===0)txt.textContent="Just a moment, optimising…";else if(i>=5)txt.textContent="Finalising the finishing touches…";i++;setTimeout(tick,p===0?520:640);};
  setTimeout(tick,500);
}

/* ============================================================
   PAGE I — ADDRESS
   ============================================================ */
function address(){
  const a=M.user.addr;
  screen.innerHTML=`<div class="topbar"><div style="font-weight:800;font-size:16px">Add delivery details</div>${avatar()}</div>
  <div style="padding:16px 18px 8px;background:linear-gradient(135deg,#f5d0d6,#f8e3e7)"><div style="font-size:13px;color:#7a1523;font-weight:600">📍 We found you near Marine Drive.</div></div>
  <div style="padding:16px 18px 40px">
    <div style="font-size:18px;font-weight:800">Where should we deliver?</div>
    <div style="font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.5">We've located you — now please add your full address. Each field needs at least 6 characters.</div>
    <div style="font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.4px;margin:18px 0 8px">MOBILE NUMBER</div>
    <div style="display:flex;gap:8px">
      <button onclick="openCC()" style="flex:none;background:var(--field);border-radius:12px;padding:14px 12px;font-size:15px;display:flex;align-items:center;gap:6px"><span>${M.user.flag}</span><span>${M.user.cc}</span><span style="color:var(--sub);font-size:12px">▾</span></button>
      <input class="field" placeholder="Mobile number" inputmode="numeric" value="${M.user.phone}" oninput="M.user.phone=this.value.replace(/\\D/g,'').slice(0,10)" />
    </div>
    <div style="font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.4px;margin:20px 0 8px">ADDRESS</div>
    <input class="field" style="margin-bottom:10px" placeholder="a. Flat / House no. (min 6 chars)" value="${a.a}" oninput="M.user.addr.a=this.value" />
    <input class="field" style="margin-bottom:10px" placeholder="b. Building / Street (min 6 chars)" value="${a.b}" oninput="M.user.addr.b=this.value" />

function search(){

    <div style="flex:1;margin:0 10px;display:flex;align-items:center;gap:8px;background:var(--field);border-radius:12px;padding:11px 13px"><span>🔍</span><input id="sq" class="field" style="padding:0;background:transparent;font-size:14px" placeholder="Search any dish — try 'biryani'" onkeydown="if(event.key==='Enter')runSearch()" /></div>${avatar()}</div>

  document.getElementById("sq").focus?.();

function runSearch(){
  tap();
  const q=(document.getElementById("sq").value||"").trim().toLowerCase();
  const msg=document.getElementById("smsg"),box=document.getElementById("sresults");box.innerHTML="";
  if(!q){msg.style.color="var(--sub)";msg.textContent="Type something first.";return;}
  msg.innerHTML=`<span class="spin" style="width:14px;height:14px;border-width:2px"></span> Searching…`;
  setTimeout(()=>{
    M.searchAttempt++;
    if(M.searchAttempt===1){msg.style.color="var(--red)";msg.innerHTML=`😅 Oops! Search hiccuped and couldn't fetch results. Please tap Search once more.`;return;}
    const id=resolveDish(q);
    if(id===null){
      const sugg=suggest(q);
      msg.style.color="var(--red)";msg.innerHTML=`🤔 We couldn't find “${escapeHtml(q)}”.`;
      box.innerHTML=`${sugg.length?`<div style="font-size:12.5px;color:var(--sub);margin:8px 0 6px">Did you mean:</div><div style="display:flex;gap:8px;flex-wrap:wrap">${sugg.map(s=>`<span class="pill" onclick="document.getElementById('sq').value='${s}';runSearch()">${s}</span>`).join("")}</div>`:""}<button class="btn btn-outline" style="margin-top:14px" onclick="nav('options')">Browse all dishes instead</button>`;
      return;
    }
    const d=dishById(id);const restos=M.dishIndex[id];
    msg.style.color="var(--green)";msg.innerHTML=`Found it — served here as “${d.quirky}”. (${d.real})`;
    box.innerHTML=`<div class="cardbox fadein" onclick="pickDish(${id})" style="margin-top:10px;padding:12px 14px;display:flex;gap:12px;align-items:center;cursor:pointer">${orbitTile(d.emoji,56)}<div style="flex:1"><div style="font-size:14px;font-weight:700">${d.quirky}</div><div style="font-size:12px;color:var(--sub);margin-top:2px">Available at ${restos.length} place${restos.length>1?'s':''} · tap to choose</div></div><span style="color:var(--sub)">›</span></div>`;
  },1300);
}
function resolveDish(q){
  if(DISH_DICT.hasOwnProperty(q))return DISH_DICT[q];
  for(const k in DISH_DICT){if(k.includes(q)||q.includes(k))return DISH_DICT[k];}
  for(const d of DISHES){if(d.real.toLowerCase().includes(q)||d.quirky.toLowerCase().includes(q))return d.id;}
  return null;
}
function suggest(q){const keys=Object.keys(DISH_DICT);const scored=keys.map(k=>[k,sim(k,q)]).sort((a,b)=>b[1]-a[1]);return [...new Set(scored.filter(s=>s[1]>0).slice(0,4).map(s=>s[0]))];}
function sim(a,b){const A=new Set(a.replace(/\s/g,"")),B=new Set(b.replace(/\s/g,""));let c=0;A.forEach(x=>{if(B.has(x))c++;});return c;}
function escapeHtml(s){return s.replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}

function debrief(){
  const secs=M.startTime?Math.round((Date.now()-M.startTime)/1000):0;const mm=Math.floor(secs/60),ss=secs%60;
  const steps=[
    ["Getting into the app","A splash that loaded twice, showing nothing","Open straight to the food"],
    ["Adding your address first","Manual entry, 6-char rule, defaulted to Vatican and refused to move until you found India in an unsorted list","Detect location, remember it, let you skip"],
    ["Browsing","Search hidden until you tapped in; offer codes to memorise by eye","A visible search and one-tap coupons"],
    ["Finding a dish","20 dishes with cryptic film names, then a list of places, then a restaurant intro, before the dish itself","Get to the dish quickly"],
    ["Searching","Broke on the first try (an honest 'Oops'), worked on the second — then made you choose a place","Work first time; show a clear match"],
    ["The dish page","Buried the essentials under origin, a full history and 'popular' nudges before the ingredients","Lead with what it is and one clear Add"],
    ["Adding one item","Three taps: which meal, confirm quantity, add-more","One tap; adjust in the cart"],
    ["The coupon","The memorised code applied — then didn't qualify anyway","Only show codes that work here"],
    ["The profile","Address, orders and card all saved — none of it usable; support replies in '1–2 business days'","Reuse saved data; help people quickly"],
  ];
  screen.innerHTML=`<div style="padding:30px 22px 40px" class="fadein">

    <div style="margin-top:28px;border-top:1px solid var(--line);padding-top:22px"><div style="font-size:12px;font-weight:800;letter-spacing:.6px">WHAT IT DID vs. THE SHORTEST PATH</div></div>
    ${steps.map(s=>`<div style="margin-top:16px"><div style="font-size:13.5px;font-weight:700">${s[0]}</div><div style="font-size:12.5px;color:var(--sub);margin-top:4px;line-height:1.45"><span style="color:var(--red)">What happened:</span> ${s[1]}</div><div style="font-size:12.5px;color:var(--sub);margin-top:2px;line-height:1.45"><span style="color:var(--green)">Shortest path:</span> ${s[2]}</div></div>`).join("")}
    <div style="margin-top:32px;text-align:center"><svg viewBox="0 0 260 260" width="220" height="220" style="max-width:80%"><circle cx="130" cy="130" r="120" fill="none" stroke="#f3c8ce" stroke-width="1.5"/><circle cx="130" cy="130" r="88" fill="none" stroke="#eaa3ad" stroke-width="1.5"/><circle cx="130" cy="130" r="56" fill="var(--red)" opacity="0.08"/><circle cx="130" cy="130" r="56" fill="none" stroke="var(--red)" stroke-width="2"/><text x="130" y="126" text-anchor="middle" font-size="13" font-weight="800" fill="#171719">Customer</text><text x="130" y="143" text-anchor="middle" font-size="13" font-weight="800" fill="#171719">experience</text><text x="130" y="60" text-anchor="middle" font-size="11" fill="#71717a">decisions</text><text x="130" y="34" text-anchor="middle" font-size="11" fill="#71717a">ideas · feedback</text></svg></div>
    <div style="margin-top:8px;background:var(--red-soft);border-radius:16px;padding:18px"><div style="font-size:14px;line-height:1.6;color:#7a1523">Customer experience is the core. Our ideas, the feedback we take, and the decisions we make all orbit it — and only matter if they make that core better. We can change almost anything, as long as the experience stays at the centre. Effort that doesn't serve it isn't a feature. It's just waste in a nicer wrapper.</div></div>
    <button onclick="restart()" style="width:100%;margin-top:20px;background:var(--ink);color:#fff;border-radius:14px;padding:14px;font-size:14px;font-weight:600">Run it again</button>
  </div>`;
}
function restart(){
  M.page="splash";M.taps=0;M.startTime=null;M.cart=[];M.memorizedCode="";M.codeMsg="";M.listSearchShown=false;M.activeResto=0;M.activeDish=0;M.pendingDish=null;M.searchAttempt=0;
  M.seed=Math.floor(Math.random()*1e9); assignDishes(M.seed); M.dishIndex=buildDishIndex();
  M.user={name:"",phone:"",cc:"+379",flag:"🇻🇦",addr:{a:"",b:"",c:"",d:""}};
  render();
}

/* ============================================================

   ============================================================ */
function showSheet(inner){closeSheet();const scrim=document.createElement("div");scrim.className="scrim";scrim.id="scrim";scrim.onclick=closeSheet;const sheet=document.createElement("div");sheet.className="sheet";sheet.id="sheet";sheet.innerHTML=inner;document.getElementById("phone").appendChild(scrim);document.getElementById("phone").appendChild(sheet);}
function closeSheet(){["scrim","sheet"].forEach(id=>{const e=document.getElementById(id);if(e)e.remove();});}
function render(){
  closeSheet();const p=M.page;
  if(p==="splash")return splash();
  if(p==="address")return address();
  if(p==="list")return list();
  if(p==="options")return options();
  if(p==="restolist")return restolist();
  if(p==="restointro")return restointro();
  if(p==="restaurant")return restaurant();
  if(p==="search")return search();
  if(p==="dish")return dish();
  if(p==="cart")return cart();
  if(p==="profile")return profile();
  if(p==="help")return help();
  if(p==="debrief")return debrief();
}
render();
